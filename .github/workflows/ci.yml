name: Test Tags Only

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  create-tag:
    uses: nohaila1231/CI-NODE-PIPELINE/.github/workflows/node-template.yml@main
    with:
      node-versions: '["20.x"]'
      enable-release: true        
      test-command: echo "ok"      
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}