name: Test Tags Only

on:
  push:
    branches: [main]

jobs:
  create-tag:
    uses: nohaila1231/CI-NODE-PIPELINE/.github/workflows/node-template.yml@main
    with:
      node-versions: '["20.x"]'
      enable-release: true        # 👈 Seulement ça pour les tags !
      test-command: echo "ok"      # Commande simple
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}