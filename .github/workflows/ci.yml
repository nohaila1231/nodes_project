name: CI Pipeline for nodes_project

permissions:
  contents: read
  security-events: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  call-template:
    uses: nohaila1231/CI-NODE-PIPELINE/.github/workflows/node-template.yml@main
    with:
      # Core (déjà actif)
      node-versions: '["20.x"]'
      test-command: "npm test"
      build-command: "npm run build"
      enable-linting: "true"
      
      # 🆕 À AJOUTER pour activer plus de fonctionnalités :
      
      # 1. Security scan (npm audit + CodeQL)
      enable-security-scan: "true"
      security-fail-on-error: "false"  # false = ne bloque pas le pipeline si vulnérabilités
      
      # 2. Code coverage (besoin d'un outil comme nyc/istanbul)
      enable-coverage: "true"
      coverage-command: "npm run coverage"  # À définir dans package.json
      coverage-threshold: "70"              # Seuil minimum requis
      
      # 3. Upload des artefacts (dossiers dist/ après build)
      enable-artifacts: "true"
      artifact-path: "dist"
      artifact-retention-days: "3"
      
      # 4. Publication npm (nécessite un secret NPM_TOKEN)
      publish-to-npm: "true"
      npm-registry: "https://registry.npmjs.org/"
      
      # 5. Release automatique (création de tag/release GitHub)
      enable-release: "true"
      release-branch: "main"
      git-user-name: "GitHub Actions"
      git-user-email: "nohaila1231@users.noreply.github.com"
      
      # 6. Déploiement multi-environnement
      enable-deployment: "true"
      deployment-command: "npm run deploy"  # Commande spécifique à votre projet
      
      # 7. Notifications Slack
      enable-notifications: "true"
      notify-on-success: "true"
      notify-on-failure: "true"
      # slack-webhook-url: "https://hooks.slack.com/..."  # À passer via secret
      
    secrets:
      # Secrets requis pour certaines fonctionnalités
      npm-token: ${{ secrets.NPM_TOKEN }}           # Pour publish-to-npm
      npm-registry-token: ${{ secrets.NPM_TOKEN }}  # Même token généralement
      git-token: ${{ secrets.GITHUB_TOKEN }}        # Pour release (déjà disponible par défaut)