name: Test Tags Only

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write
  security-events: write
  actions: read 

jobs:
  create-tag:
    uses: nohaila1231/CI-NODE-PIPELINE/.github/workflows/node-template.yml@v1.0.0
    with:
      node-versions: '["20.x"]'
      enable-release: true  
      enable-security-scan: true      
      test-command: echo "ok"      
    secrets:
      git-token: ${{ secrets.GITHUB_TOKEN }}