name: Test Template Workflow

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Test 1: Basic workflow (all defaults)
  basic-test:
    name: Basic Workflow Test
    uses: ./.github/workflows/node-template.yml
    with:
      package-manager: npm
      node-version: '20.x'
      test-command: npm test
      build-command: npm run build

  # Test 2: With security scanning
  security-test:
    name: With Security Scanning
    uses: ./.github/workflows/node-template.yml
    with:
      package-manager: npm
      node-version: '20.x'
      test-command: npm test
      build-command: npm run build
      enable-security-scan: 'true'

  # Test 3: Matrix testing (multiple Node versions)
  matrix-test:
    name: Matrix Testing
    uses: ./.github/workflows/node-template.yml
    with:
      package-manager: npm
      node-version: '18.x,20.x,22.x'
      test-command: npm test
      build-command: npm run build
